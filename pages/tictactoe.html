<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="../css/tictactoe.css">
</head>

<body>
    <div class="container">
        <div class="user-form">
            <form class="user-score">
                <label for="playerOne">Enter player X's name: </label>
                <input value="John" name="playerOne" id="playerOne" type="text">
                <br>
                <br>
                <label for="playerTwo">Enter player O's name: </label>
                <input value="Smith" name="playerTwo" id="playerTwo" type="text">
                <table class="scores">
                    <tbody>
                        <tr>
                            <th>Player</th>
                            <th>Score</th>
                        </tr>
                        <tr>
                            <td class="playerOne">
                                Player One
                            </td>
                            <td class="playerOne">
                                0
                            </td>
                        </tr>
                        <tr>
                            <td class="playerTwo">
                                Player Two
                            </td>
                            <td class="playerTwo">
                                0
                            </td>
                        </tr>
                    </tbody>
                </table>
                <br>
                <br>
                <input type="submit" id="start" value="Play">
                <input type="submit" id="reset" value="Reset">
            </form>
            <p id="game-text"></p>
        </div>
        <table class="game-board">
            <tbody>
                <tr class="game-board">
                    <td class="top game-board" id="t-left">
                        O
                    </td>
                    <td class="top game-board" id="t-middle">
                        O
                    </td>
                    <td class="top game-board" id="t-right">
                        O
                    </td>
                </tr>
                <tr class="game-board">
                    <td class="middle game-board" id="m-left">
                        X
                    </td>
                    <td class="middle game-board" id="m-middle">
                        X
                    </td>
                    <td class="middle game-board" id="m-right">
                        X
                    </td>
                </tr>
                <tr class="game-board">
                    <td class="bottom game-board" id="b-left">
                        O
                    </td>
                    <td class="bottom game-board" id="b-middle">
                        O
                    </td>
                    <td class="bottom game-board" id="b-right">
                        O
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="js/tictactoe.js"></script>
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

      ga('create', 'UA-61313157-1', 'auto');
      ga('send', 'pageview');

    </script>
</body>

</html>
